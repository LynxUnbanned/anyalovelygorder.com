<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anya Gorder</title>
    <meta name="description" content="Portfolio website for film student Anya Gorder.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="home-page">
    <main class="room" aria-label="Anya Gorder portfolio">
      <div class="paint-strip" aria-hidden="true"></div>
      <div class="lace" aria-hidden="true"></div>
      <div class="ceiling">
        <div class="fan" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <i></i>
        </div>
      </div>
      <div class="back-wall" aria-hidden="true"></div>
      <div class="left-wall" aria-hidden="true"></div>
      <div class="right-wall" aria-hidden="true">
        <div class="window">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="floor" aria-hidden="true"></div>
      <div class="speckles speckles-left" aria-hidden="true"></div>
      <div class="speckles speckles-right" aria-hidden="true"></div>
      <div class="speckles speckles-bottom" aria-hidden="true"></div>

      <nav class="polaroids" aria-label="Portfolio sections">
        <a class="polaroid polaroid-films" href="films.html" aria-label="Films">
          <img src="assets/Films.jpeg" alt="Films" onerror="this.style.display='none'">
          <span class="fallback-card fallback-films"><b></b><em>Films</em></span>
        </a>
        <a class="polaroid polaroid-about" href="about.html" aria-label="About Me">
          <img src="assets/About Me.jpeg" alt="About Me" onerror="this.style.display='none'">
          <span class="fallback-card fallback-about"><b></b><em>About Me</em></span>
        </a>
        <a class="polaroid polaroid-writing" href="writing.html" aria-label="Writing">
          <img src="assets/Writing.jpeg" alt="Writing" onerror="this.style.display='none'">
          <span class="fallback-card fallback-writing"><b></b><em>Writing&hearts;</em></span>
        </a>
        <a class="polaroid polaroid-resume" href="resume.html" aria-label="Resume">
          <img src="assets/Resume.jpeg" alt="Resume" onerror="this.style.display='none'">
          <span class="fallback-card fallback-resume"><b></b><em>Resume</em></span>
        </a>
      </nav>

      <a class="contact-link" href="contact.html">CONTACT</a>
    </main>
  </body>
</html>
